name: Coverage

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.5.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        run: pdm install -G test

      - name: Run tests with coverage
        run: |
          pdm run pytest --cov=backon --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9fbb50e41978556f51010a5 # v5.4.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
