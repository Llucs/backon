name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pdm
      - run: pdm install -G lint -G test
      - run: pdm run pytest tests/ -v
      - run: pdm run mypy backon/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pdm
      - run: pdm install -G lint
      - run: pdm run ruff check backon/ tests/
      - run: pdm run ruff format --check backon/ tests/
