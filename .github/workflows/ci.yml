name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install pdm

      - run: pdm install -G lint -G test

      - run: pdm run pytest tests/ -v --cov=backon --cov-report=xml --cov-report=term-missing

      - run: pdm run mypy backon/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install pdm

      - run: pdm install -G lint

      - run: pdm run ruff check backon/ tests/

      - run: pdm run ruff format --check backon/ tests/