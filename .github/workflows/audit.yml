name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "pdm.lock"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "pdm.lock"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.5.0
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit --strict --desc on
