name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - run: pip install pdm

      - run: pdm install -G lint -G test

      - run: pdm run pytest tests/ -v --cov=backon --cov-report=xml --cov-report=term-missing

      - run: pdm run mypy backon/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.5.0
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install pdm

      - run: pdm install -G lint

      - run: pdm run ruff check backon/ tests/

      - run: pdm run ruff format --check backon/ tests/
