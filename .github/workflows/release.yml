name: Release

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pdm
      - run: pdm install -G lint -G test
      - run: pdm run pytest tests/ -q
      - run: pdm run ruff check backon/
      - run: pdm run mypy backon/

  build:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pdm
      - run: pdm build
      - uses: actions/upload-artifact@v4
        with:
          name: Packages
          path: dist/*

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Packages
          path: dist
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"
      - uses: pypa/gh-action-pypi-publish@release/v1
